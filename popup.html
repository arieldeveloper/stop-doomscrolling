<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doomless Feed</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Courier New", Courier, monospace;
      background: #fff;
      color: #111;
      width: 260px;
      padding: 18px 20px 20px;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 11px;
      opacity: 0.55;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
    }

    .stat-value.warn {
      color: #c07000;
    }

    .stat-value.limit {
      color: #c00;
    }

    .bar-wrap {
      width: 100%;
      height: 5px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .bar {
      height: 100%;
      background: #111;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .bar.warn {
      background: #c07000;
    }

    .bar.limit {
      background: #c00;
    }

    .site-breakdown {
      font-size: 11px;
      opacity: 0.55;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .site-breakdown span {
      display: flex;
      justify-content: space-between;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 14px;
    }

    .limit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .limit-row label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.55;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.75;
    }

    .toggle-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #111;
      cursor: pointer;
    }

    .limit-row input[type="number"] {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      width: 64px;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 3px 6px;
      text-align: right;
    }

    button {
      width: 100%;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
      margin-bottom: 6px;
    }

    button:hover {
      background: #333;
    }

    button.secondary {
      background: transparent;
      color: #111;
      border: 1.5px solid #111;
    }

    button.secondary:hover {
      background: #f5f5f5;
    }

    .footer {
      font-size: 10px;
      opacity: 0.35;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>Doomless Feed</h1>

  <div class="stat-row">
    <span class="stat-label">Today's posts</span>
    <span class="stat-value" id="today-count">—</span>
  </div>
  <div class="bar-wrap">
    <div class="bar" id="progress-bar" style="width: 0%"></div>
  </div>

  <div class="site-breakdown" id="site-breakdown">
    <span><em>X / Twitter</em><b id="count-x">0</b></span>
  </div>

  <hr />

  <div class="toggle-row">
    <label for="enabled-toggle">Extension enabled</label>
    <input type="checkbox" id="enabled-toggle" />
  </div>

  <div class="toggle-row">
    <label for="dark-mode-toggle">Dark mode</label>
    <input type="checkbox" id="dark-mode-toggle" />
  </div>

  <div class="limit-row">
    <label>Daily limit</label>
    <input type="number" id="limit-input" min="10" max="1000" value="150" />
  </div>

  <button id="save-limit">Save limit</button>
  <button class="secondary" id="reset-today">Reset today's count</button>

  <div class="footer">
    Created by Claude + <a id="creator-link" href="#" style="color: inherit; text-decoration: underline; opacity: 1;">@arielchouminov</a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
